<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Family Adda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="cashier.css" />
</head>

<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Family Adda</h2>
                <button id="closeSidebar" class="close-sidebar-btn">×</button>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-section="payment">
                    <span class="icon">₹</span> Orders & Payments
                </button>
                <button class="nav-item" data-section="menu">
                    <span class="icon">🍱</span> Menu Management
                </button>
                <button class="nav-item" data-section="sales">
                    <span class="icon">📊</span> Sales Analytics
                </button>
                <button class="nav-item" data-section="history">
                    <span class="icon">📜</span> History
                </button>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button id="toggleSidebar" class="toggle-btn">☰</button>
                <h1 id="pageTitle">Orders & Payments</h1>
            </header>

            <!-- Section: Payment Collection -->
            <section id="payment-section" class="content-section active">
                <div class="orders-grid">
                    <!-- Orders will be dynamically loaded from Firebase -->
                </div>
            </section>

            <!-- Section: Menu Management -->
            <section id="menu-section" class="content-section">
                <div class="menu-container">
                    <div class="menu-header">
                        <h2>Manage Menu Items</h2>
                        <div class="menu-actions">
                            <input type="text" id="menuSearchInput" placeholder="Search items or categories..."
                                class="search-input">
                            <button id="addMenuItemBtn" class="add-btn">Add New Item</button>
                        </div>
                    </div>

                    <div class="menu-table-container">
                        <table class="menu-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Price (₹)</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="menuItemsList">
                                <!-- Menu items will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Section: Sales Analytics -->
            <section id="sales-section" class="content-section">
                <div class="sales-container">
                    <div class="sales-filters">
                        <button id="weekFilterBtn" class="filter-btn active" data-type="week">Current Week</button>

                        <div class="filter-group-select">
                            <select id="monthFilter" class="filter-select">
                                <option value="" disabled selected>Select Month</option>
                                <!-- JS will populate specific months -->
                            </select>

                            <select id="yearFilter" class="filter-select">
                                <option value="" disabled selected>Select Year</option>
                                <!-- JS will populate years -->
                            </select>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                    <div class="stats-summary">
                        <!-- Summary cards can go here if needed later -->
                    </div>
                </div>
            </section>

            <!-- Section: Transaction History -->
            <section id="history-section" class="content-section">
                <div class="history-container">
                    <div class="history-header">
                        <h2>Transaction History</h2>
                        <div class="date-filter-group">
                            <label for="historyDateFilter">Select Date: </label>
                            <input type="date" id="historyDateFilter" class="date-picker">
                        </div>
                    </div>
                    <div class="history-grid" id="historyGrid">
                        <!-- Dynamic History Cards -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Payment Collection</h2>
            </div>
            <div class="modal-body">
                <p id="modalMessage"></p>
            </div>
            <div class="modal-footer">
                <button id="confirmBtn" class="confirm-btn">Confirm Payment</button>
                <button id="cancelBtn" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Menu Item Modal (Add/Edit) -->
    <div id="menuModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="menuModalTitle">Add New Item</h2>
            </div>
            <div class="modal-body">
                <form id="menuForm">
                    <input type="hidden" id="menuItemId">
                    <div class="form-group-admin">
                        <label for="itemName">Item Name</label>
                        <input type="text" id="itemName" required />
                    </div>
                    <div class="form-group">
                        <label for="itemCategory">Category</label>
                        <select id="itemCategory" required>
                            <!-- Categories will be populated via JS -->
                            <option value="Beverages">Beverages</option>
                            <option value="Crispy Dosa">Crispy Dosa</option>
                            <option value="Spongy Idli">Spongy Idli</option>
                            <option value="Fluffy Uthappam">Fluffy Uthappam</option>
                            <option value="Chatpati Pav Bhaji">Chatpati Pav Bhaji</option>
                            <option value="Chole Bhature">Chole Bhature</option>
                            <option value="Noodles">Noodles</option>
                            <option value="Maggi">Maggi</option>
                            <option value="Chinese Rice">Chinese Rice</option>
                            <option value="Fresh Soup">Fresh Soup</option>
                            <option value="Salad">Salad</option>
                            <option value="Starters">Starters</option>
                            <option value="Chinese Main Course">Chinese Main Course</option>
                            <option value="Rolls">Rolls</option>
                            <option value="Momos (8 Pcs)">Momos (8 Pcs)</option>
                            <option value="Pasta">Pasta</option>
                            <option value="Paneer Main Course">Paneer Main Course</option>
                            <option value="Veg Main Course">Veg Main Course</option>
                            <option value="Dal">Dal</option>
                            <option value="Rice">Rice</option>
                            <option value="Roti & Paratha">Roti & Paratha</option>
                            <option value="Raita">Raita</option>
                            <option value="Mini Meals">Mini Meals</option>
                            <option value="Sweets">Sweets</option>
                            <option value="Home Made Moong Ka Halwa">Home Made Moong Ka Halwa</option>
                            <option value="Home Made Shrikhand">Home Made Shrikhand</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="itemPrice">Price (₹)</label>
                        <input type="number" id="itemPrice" required />
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="saveMenuItemBtn" class="confirm-btn">Save</button>
                <button id="cancelMenuBtn" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="admin.js"></script>
</body>

</html>
