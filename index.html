<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>Chef Login</h1>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <input type="text" id="userId" name="userId" placeholder="User ID" required autocomplete="off" />
        </div>

        <div class="form-group">
          <input type="password" id="password" name="password" placeholder="Password" required autocomplete="off" />
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
  <script>
    // Check for role in query parameters
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role');

    if (role === 'cashier') {
      document.title = 'Cashier Login';
      document.querySelector('.login-header h1').textContent = 'Cashier Login';
    } else {
      // Default to Chef Login (already set in HTML, but ensuring consistency)
      document.title = 'Chef Login';
      document.querySelector('.login-header h1').textContent = 'Chef Login';
    }
  </script>
</body>

</html>
